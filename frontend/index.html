<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard V1</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d0f14; --bg2:#131620; --bg3:#1a1e2e; --bg4:#1f2438;
    --border:#ffffff12; --border2:#ffffff20;
    --text:#e8eaf0; --text2:#8b93a8; --text3:#5a6178;
    --accent:#7c6fff;
    --green:#22d87a; --red:#ff4f6e;
    --card-radius:16px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}

  /* NAV */
  nav{display:flex;align-items:center;gap:16px;padding:0 28px;height:60px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
  .nav-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
  .badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.05em}
  .nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
  .api-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
  .api-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:.3s}
  .api-dot.ok{background:var(--green)} .api-dot.err{background:var(--red)}
  .icon-btn{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:.15s}
  .icon-btn:hover{background:var(--bg4);color:var(--text)}

  /* MAIN */
  main{padding:24px 28px}

  /* SEARCH */
  .search-wrap{position:relative;margin-bottom:24px}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
  .search-input{width:100%;padding:13px 14px 13px 44px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:.2s}
  .search-input:focus{border-color:var(--accent);background:var(--bg3)}
  .search-input::placeholder{color:var(--text3)}

  /* SECTION */
  .section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
  .section-count{background:var(--bg3);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--text2)}

  /* GRID */
  .market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

  /* CARD */
  .asset-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:18px;transition:.2s;overflow:hidden}
  .asset-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
  .asset-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .asset-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .asset-name{font-weight:600;font-size:15px;line-height:1.2}
  .asset-symbol{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
  .asset-price{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
  .asset-change{font-size:13px;font-weight:500;font-family:'JetBrains Mono',monospace;margin-bottom:14px}
  .up{color:var(--green)} .down{color:var(--red)}
  canvas.spark{display:block;width:100%;height:48px}

  /* SKELETON */
  .skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--card-radius);height:168px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* ERROR */
  .error-banner{background:#ff4f6e18;border:1px solid var(--red);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:flex;align-items:center;gap:8px}

  /* STATUS BAR */
  .status-bar{display:flex;align-items:center;gap:6px;padding:12px 28px;background:var(--bg2);border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .refresh-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-left:6px}
  .refresh-btn:hover{color:var(--text);border-color:var(--border2)}
  .refresh-btn.spinning svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    </div>
    Market Dashboard
    <span class="badge">V1</span>
  </div>
  <div class="nav-right">
    <div class="api-status">
      <div class="api-dot" id="api-dot"></div>
      <span id="api-label">connecting…</span>
    </div>
    <div class="icon-btn" title="Account">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </div>
</nav>

<main>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="search-input" placeholder="ค้นหาสินทรัพย์ (BTC, AAPL, GOLD…)" oninput="filterAssets(this.value)">
  </div>

  <div id="error-banner" class="error-banner" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="error-msg"></span>
  </div>

  <div id="market-content"></div>
</main>

<div class="status-bar">
  <div class="live-dot" id="live-dot"></div>
  <span id="status-text">กำลังเชื่อมต่อ…</span>
  <span style="margin-left:auto">Last updated: <span id="last-updated">—</span></span>
  <button class="refresh-btn" id="refresh-btn" onclick="refresh(true)" title="Refresh">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-8.49"/></svg>
  </button>
</div>

<script>
const API = 'http://localhost:8000/api';

const CATEGORIES = [
  {key:'crypto',    label:'Cryptocurrency'},
  {key:'stock',     label:'Stocks'},
  {key:'index',     label:'Indices'},
  {key:'commodity', label:'Commodities'},
  {key:'forex',     label:'Forex'},
];

let marketData = [];
const sparkData = {};

// ─── API ──────────────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`, {signal: AbortSignal.timeout(3000)});
    const ok = r.ok;
    document.getElementById('api-dot').className = 'api-dot ' + (ok?'ok':'err');
    document.getElementById('api-label').textContent = ok ? 'API online' : 'API offline';
    document.getElementById('live-dot').style.background = ok ? 'var(--green)' : 'var(--red)';
    document.getElementById('status-text').textContent = ok ? 'Data delayed 1 min' : 'ไม่สามารถเชื่อมต่อ API ได้ — รัน start.sh ก่อน';
    return ok;
  } catch {
    document.getElementById('api-dot').className = 'api-dot err';
    document.getElementById('api-label').textContent = 'API offline';
    document.getElementById('live-dot').style.background = 'var(--red)';
    document.getElementById('status-text').textContent = 'ไม่สามารถเชื่อมต่อ API ได้ — รัน start.sh ก่อน';
    return false;
  }
}

async function loadMarket() {
  try {
    const r = await fetch(`${API}/market`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const json = await r.json();
    marketData = json.data || [];
    document.getElementById('error-banner').style.display = 'none';
    renderMarket();
    document.getElementById('last-updated').textContent = new Date(json.updated_at).toLocaleTimeString('th');
  } catch(e) {
    document.getElementById('error-banner').style.display = 'flex';
    document.getElementById('error-msg').textContent = `ไม่สามารถดึงข้อมูลได้: ${e.message} — ตรวจสอบว่า backend รันอยู่ที่ localhost:8000`;
    if (!marketData.length) showSkeletons();
  }
}

async function refresh(spin=false) {
  const btn = document.getElementById('refresh-btn');
  if (spin) btn.classList.add('spinning');
  await checkHealth();
  await loadMarket();
  if (spin) btn.classList.remove('spinning');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function showSkeletons() {
  document.getElementById('market-content').innerHTML =
    CATEGORIES.map(c => `
      <div class="section-label">${c.label}</div>
      <div class="market-grid">${'<div class="skeleton"></div>'.repeat(5)}</div>
    `).join('');
}

function renderMarket() {
  const catMap = {};
  marketData.forEach(a => {
    if (!catMap[a.category]) catMap[a.category] = [];
    catMap[a.category].push(a);
  });

  let html = '';
  CATEGORIES.forEach(({key, label}) => {
    const items = catMap[key];
    if (!items?.length) return;
    html += `<div class="section-label" data-section="${key}">${label} <span class="section-count">${items.length}</span></div>`;
    html += `<div class="market-grid" data-grid="${key}">`;
    items.forEach(a => { html += cardHTML(a); });
    html += `</div>`;
  });

  // any leftover categories not in the list above
  Object.keys(catMap).forEach(key => {
    if (CATEGORIES.find(c=>c.key===key)) return;
    const items = catMap[key];
    html += `<div class="section-label" data-section="${key}">${key} <span class="section-count">${items.length}</span></div>`;
    html += `<div class="market-grid" data-grid="${key}">`;
    items.forEach(a => { html += cardHTML(a); });
    html += `</div>`;
  });

  document.getElementById('market-content').innerHTML = html;
  marketData.forEach(a => drawSpark(a));
}

function cardHTML(a) {
  const up = a.change_pct >= 0;
  const sign = up ? '+' : '';
  return `<div class="asset-card" id="card-${a.symbol}">
    <div class="asset-header">
      <div class="asset-icon" style="background:${a.bg};color:${a.color}">${a.icon}</div>
      <div>
        <div class="asset-name">${a.name}</div>
        <div class="asset-symbol">${a.symbol}</div>
      </div>
    </div>
    <div class="asset-price">$${fmt(a.price)}</div>
    <div class="asset-change ${up?'up':'down'}">
      ${sign}${fmt(a.change)} (${sign}${a.change_pct.toFixed(2)}%) ${up?'↑':'↓'}
    </div>
    <canvas class="spark" id="spark-${a.symbol}"></canvas>
  </div>`;
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function genSpark(up, n=40) {
  const d=[]; let v=50;
  for(let i=0;i<n;i++){v+=Math.random()*6-3+(up?.8:-.5); d.push(Math.max(10,Math.min(90,v)));}
  return d;
}

function drawSpark(a) {
  const cv = document.getElementById('spark-'+a.symbol);
  if (!cv) return;
  if (!sparkData[a.symbol]) sparkData[a.symbol] = genSpark(a.change_pct >= 0);
  const data = sparkData[a.symbol];
  const up = a.change_pct >= 0;
  const w = cv.offsetWidth || 200, h = 48;
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  const min = Math.min(...data), max = Math.max(...data), range = max-min||1;
  const pts = data.map((v,i) => ({x:i/(data.length-1)*w, y:h-(v-min)/range*h*.85-4}));
  ctx.clearRect(0,0,w,h);
  const col = up ? '#22d87a' : '#ff4f6e';
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  const grd = ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0, up?'#22d87a30':'#ff4f6e30');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd; ctx.fill();
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function filterAssets(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.asset-card').forEach(card => {
    const sym = card.id.replace('card-','');
    const a = marketData.find(x=>x.symbol===sym);
    const match = !q || sym.toLowerCase().includes(q) || (a&&a.name.toLowerCase().includes(q));
    card.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('[data-grid]').forEach(grid => {
    const visible = [...grid.children].some(c=>c.style.display!=='none');
    grid.style.display = visible ? '' : 'none';
    const lbl = grid.previousElementSibling;
    if (lbl) lbl.style.display = visible ? '' : 'none';
  });
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n==null) return '—';
  if (n >= 1000) return n.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (n >= 1)    return n.toFixed(2);
  return n.toFixed(6);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
showSkeletons();
(async () => {
  await checkHealth();
  await loadMarket();
  setInterval(refresh, 60000);
})();

window.addEventListener('resize', () => marketData.forEach(a => drawSpark(a)));
</script>
</body>
</html>
